macros:
  - name: cents_to_dollars
    description: Convert cents to dollar and accept decimal places
    arguments:
      - name: column_name
        type: string
        description: the name of the column you want to convert
      - name: decimal
        type: int
        description: number of decimal places, default to 2
  - name: grant_select
    description: macro that grant privilege to target.schema and target.role uless specify otherwise
    arguments:
      - name: schema
        type: string
        description: schema to grant privs
      - name: role
        type: string
        description: role to grant privs